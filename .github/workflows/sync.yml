name: Sync upstream release

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:
    inputs:
      upstream_tag:
        description: 可选；为空时自动检测上游 latest release
        required: false
        type: string

permissions:
  contents: read
  actions: write

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout scaffolding repository
        uses: actions/checkout@v4

      - name: Detect upstream tag
        id: detect
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          INPUT_TAG: ${{ inputs.upstream_tag }}
        run: |
          tag="$(scripts/detect-upstream.sh "${INPUT_TAG:-}")"
          echo "tag=${tag}" >> "$GITHUB_OUTPUT"
          echo "使用上游 tag: ${tag}"

      - name: Exit when release already exists
        id: exists
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.detect.outputs.tag }}
        run: |
          if gh release view "${TAG}" --repo "${GITHUB_REPOSITORY}" >/dev/null 2>&1; then
            echo "release ${TAG} 已存在，跳过。"
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Trigger release workflow
        if: ${{ steps.exists.outputs.exists != 'true' }}
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          TAG: ${{ steps.detect.outputs.tag }}
        run: |
          gh workflow run release.yml \
            --repo "${GITHUB_REPOSITORY}" \
            --ref "${GITHUB_REF_NAME}" \
            -f upstream_tag="${TAG}" \
            -f package_release=1 \
            -f publish=true \
            -f overwrite_assets=false
